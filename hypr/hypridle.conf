general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = pidof hyprlock || hyprlock & sleep 1
    after_sleep_cmd = sleep 1 && hyprctl dispatch dpms on && python3 ~/.config/hypr/scripts/monitor-hotplug.py --resume-recover --delay 3
}

# Dim screen after 4 minutes
listener {
    timeout = 240
    on-timeout = brightnessctl -s set 20%
    on-resume = brightnessctl -r
}

# Lock screen after 5 minutes
listener {
    timeout = 300
    on-timeout = pidof hyprlock || hyprlock
    on-resume = hyprctl dispatch dpms on
}

# Turn off displays after 6 minutes
listener {
    timeout = 360
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 15 minutes
listener {
    timeout = 900
    on-timeout = systemctl suspend
}
